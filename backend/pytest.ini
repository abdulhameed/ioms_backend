[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    phase1: Phase 1 – Infrastructure & scaffolding
    phase2: Phase 2 – Authentication, RBAC & audit
    phase3: Phase 3 – Approval workflow engine
    phase4: Phase 4 – Project & site management
    phase5: Phase 5 – Shortlets & asset management
    phase6: Phase 6 – Maintenance & issue escalation
    phase7: Phase 7 – Notifications & background jobs
    phase8: Phase 8 – Deployment readiness & security
